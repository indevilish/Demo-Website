<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Develish Demo Website Index Portal</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f7fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .portal-container {
            width: 100%;
            max-width: 550px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            padding: 24px;
        }
        .portal-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .portal-header h1 {
            font-size: 22px;
            color: #1a202c;
            margin: 0;
        }
        .portal-header p {
            font-size: 13px;
            color: #718096;
            margin: 4px 0 0 0;
        }
        .form-section {
            background: #edf2f7;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .form-section h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #2d3748;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            margin-bottom: 8px;
            box-sizing: border-box;
            font-size: 13px;
        }
        .btn-submit {
            width: 100%;
            padding: 10px;
            background-color: #2b6cb0;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-submit:hover { background-color: #1a365d; }
        .search-box {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 12px;
            margin-bottom: 15px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .table-container {
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background-color: #1a365d;
            color: white;
            padding: 12px;
            font-size: 13px;
            text-align: left;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 13px;
        }
        tr:last-child td { border-bottom: none; }
        .web-link { color: #3182ce; text-decoration: none; word-break: break-all; }
        .insta-link { color: #e1306c; text-decoration: none; font-weight: bold; }
        .web-link:hover, .insta-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="portal-container">
    <div class="portal-header">
        <h1>Develish Demo website index Portal</h1>
        <p>hand-picked resources & references · clean, clickable table with socials</p>
    </div>

    <!-- Web Entry Form -->
    <div class="form-section">
        <h3>➕ Add Dynamic Site Entry</h3>
        <div class="input-group">
            <input type="text" id="webName" placeholder="Enter Website Name (e.g. Tooth Haus)">
            <input type="url" id="webUrl" placeholder="Enter URL (https://...)">
            <input type="text" id="webInsta" placeholder="Enter Instagram Username (e.g. tooth_haus)">
        </div>
        <button class="btn-submit" onclick="addWebsite()">Save to Google Sheet</button>
    </div>

    <!-- Live Search Box -->
    <input type="text" id="searchInp" class="search-box" placeholder="🔍 Search indexing by name..." oninput="filterWebsites()">

    <!-- Table Grid -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 35%;">🌐 Website Name</th>
                    <th style="width: 40%;">🔗 URL</th>
                    <th style="width: 25%;">📸 Instagram</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="3" style="text-align:center; color:#718096;">Syncing with cloud sheet...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // NOTE: Apna update kiya hua Web App URL yahan paste karein[span_14](start_span)[span_14](end_span)[span_15](start_span)[span_15](end_span)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwvqsJuvzwPQ42M1jOqTQFG_w_tvKEGzEWZYSqmEpvUNVG1vjeVX9OuE2c_cx8Mh2Sw2w/exec";
    let DB_CACHE = [];

    async function fetchWebsites() {
        try {
            const res = await fetch(SCRIPT_URL);
            DB_CACHE = await res.json();
            renderTable(DB_CACHE);
        } catch (err) {
            document.getElementById('tableBody').innerHTML = `<tr><td colspan="3" style="color:red; text-align:center;">Failed to load index.</td></tr>`;
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        if(data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;">No records active.</td></tr>`;
            return;
        }
        tbody.innerHTML = data.map(item => {
            // Instagram rendering condition
            const instaDisplay = (item.instagram && item.instagram !== "N/A") 
                ? `<a class="insta-link" href="https://instagram.com/${item.instagram.replace('@','')}" target="_blank">@${item.instagram.replace('@','')}</a>` 
                : `<span style="color:#a0aec0;">None</span>`;

            return `
                <tr>
                    <td><strong>🌐 ${item.name}</strong></td>
                    <td><a class="web-link" href="${item.url}" target="_blank">${item.url}</a></td>
                    <td>${instaDisplay}</td>
                </tr>
            `;
        }).join('');
    }

    function filterWebsites() {
        const query = document.getElementById('searchInp').value.toLowerCase();
        const filtered = DB_CACHE.filter(item => item.name.toLowerCase().includes(query));
        renderTable(filtered);
    }

    async function addWebsite() {
        const nameInp = document.getElementById('webName');
        const urlInp = document.getElementById('webUrl');
        const instaInp = document.getElementById('webInsta');
        
        if(!nameInp.value.trim() || !urlInp.value.trim()) {
            alert("Kripya Website Name aur URL fill karein!");
            return;
        }

        const btn = document.querySelector('.btn-submit');
        btn.innerText = "Syncing Data...";
        btn.disabled = true;

        const payload = { 
            name: nameInp.value.trim(), 
            url: urlInp.value.trim(),
            instagram: instaInp.value.trim() || "N/A"
        };

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            alert("Website aur Instagram data perfectly save ho gaya!");
            nameInp.value = '';
            urlInp.value = '';
            instaInp.value = '';
            setTimeout(fetchWebsites, 1200); 
        } catch(err) {
            alert("Submission anomaly detected.");
        } finally {
            btn.innerText = "Save to Google Sheet";
            btn.disabled = false;
        }
    }

    window.onload = fetchWebsites;
</script>

</body>
</html>
